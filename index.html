<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Papá</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente manuscrita para la carta -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">
</head>
<body>

    <!-- EL SOBRE CERRADO -->
    <div class="envelope-container" id="envelopeContainer">
        <div class="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-body"></div>
            <div class="heart-seal">💌</div>
        </div>
        <p class="click-text">Toca para abrir</p>
    </div>

    <!-- LA CARTA (Oculta al principio) -->
    <div class="letter-container hidden" id="letterContainer">
        <div class="letter">
            <div class="photo-area">
                <!-- CAMBIA ESTA URL POR LA FOTO DE TU PAPÁ -->
                <img src="https://images.unsplash.com/photo-1542596594-649edbc13630?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Papá">
            </div>
            <h1>¡Feliz Cumpleaños!</h1>
            <p class="letter-text">
                Querido Papá,<br><br>
                Hoy es un día muy especial. Gracias por ser nuestro héroe, nuestro guía y nuestro mejor amigo. 
                Que este nuevo año de vida esté lleno de salud, risas y momentos inolvidables.
                <br><br>
                ¡Te queremos muchísimo!
            </p>
            <div class="signature">Con amor, tu familia ❤️</div>
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
